<html>
<head>
  <title>Final Project Sample Assets</title>
  <style>
    body {
      background-color: navy;
    }
    img {
      max-height: 25vh;
    }
    img.banner {
      max-height: 40vh;
    }
    img.wind {
      height: 12vh;
      margin-bottom: 8vh;
    }
  </style>
</head>
<head>
  <base href="https://raw.githubusercontent.com/CraigLombardi/ppl-js2026/main/">
</head>
<body>
  <img  class="banner" src="instructions.png">
  <p/>
  <img src="8ball-master1.png" alt="8 Ball Window 1">
  <img src="8ball-master2.png" alt="8 Ball Window 2" class="wind">
  <img src="8ball-master3.png" alt="8 Ball Window 3">
  <img src="8ball-master4.png" alt="8 Ball Window 4" class="wind">
  <br/>
  <img src="8ball-asset1.png" alt="8 Ball Front">
  <img src="8ball-asset2.png" alt="8 Ball Hand Front">
  <img src="8ball-asset3.png" alt="8 Ball Rear">
  <img src="8ball-asset4.png" alt="8 Ball Hand Rear">
  <br/>
  <img src="rps-asset1.png" alt="Rock 1">
  <img src="rps-asset2.png" alt="Paper 1">
  <img src="rps-asset3.png" alt="Scissors 1">
  <br/>
  <img src="rps-asset4.png" alt="Rock 2">
  <img src="rps-asset5.png" alt="Paper 2">
  <img src="rps-asset6.png" alt="Scissors 2">

<script>
  let images = document.querySelectorAll("img");

  images.forEach(function(img) {
    let fileName = img.src.split("/").pop().concat(" - ").concat(img.alt);
    img.title = fileName;
  });
</script>

</body>
</html>
